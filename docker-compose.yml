services:
  # ==================================
  # 1. BASE DE DATOS (PostgreSQL)
  # ==================================
  database:
    image: postgres:16-alpine
    container_name: taskflow-database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taskflow-network
    restart: unless-stopped

  # ==================================
  # 2. REDIS (Cache)
  # ==================================
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    networks:
      - taskflow-network
    restart: unless-stopped
  
  # ==================================
  # 3. BACKEND (Laravel)
  # ==================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - database
      - redis
    networks:
      - taskflow-network
    restart: unless-stopped

  # =================================
  # 4. FRONTEND (Next.js)
  # =================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - taskflow-network
    restart: unless-stopped

# ====================================
# VOLUMENES (Persistencia de datos)
# ====================================
volumes:
  postgres_data:
    driver: local

# ====================================
# REDES (Comunicacion entre contenedores)
# ====================================
networks:
  taskflow-network:
    driver: bridge